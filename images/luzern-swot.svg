<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2A2028" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#2A2028">Strategic classification framework</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#7A8A9A">Relative presence (RCA) vs technological proximity to existing strengths</text>

  <line x1="120" y1="78" x2="120" y2="415" stroke="#2A2028" stroke-width="1.5" marker-start="url(#a)"/>
  <line x1="120" y1="415" x2="740" y2="415" stroke="#2A2028" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="108" y="88" text-anchor="end" font-size="11" font-weight="600" fill="#2A2028">High</text>
  <text x="108" y="412" text-anchor="end" font-size="11" font-weight="600" fill="#2A2028">Low</text>
  <text x="56" y="250" text-anchor="middle" font-size="11" font-weight="600" fill="#2A2028" transform="rotate(-90,56,250)">Technological proximity</text>
  <text x="132" y="436" font-size="11" font-weight="600" fill="#2A2028">Low</text>
  <text x="726" y="436" text-anchor="end" font-size="11" font-weight="600" fill="#2A2028">High</text>
  <text x="430" y="458" text-anchor="middle" font-size="11" fill="#7A8A9A">Relative presence (RCA)</text>

  <line x1="430" y1="78" x2="430" y2="415" stroke="#2A2028" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.15"/>
  <line x1="120" y1="247" x2="740" y2="247" stroke="#2A2028" stroke-width="0.5" stroke-dasharray="6 4" opacity="0.15"/>

  <rect x="122" y="80" width="306" height="165" rx="8" fill="#0D9B8A" fill-opacity="0.12"/>
  <text x="275" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#0A7A6C">Opportunity</text>
  <text x="275" y="136" text-anchor="middle" font-size="11" fill="#0D9B8A" font-weight="500">Adjacent to strengths, not yet established</text>

  <rect x="432" y="80" width="306" height="165" rx="8" fill="#C0284A" fill-opacity="0.12"/>
  <text x="585" y="114" text-anchor="middle" font-size="17" font-weight="700" fill="#9A1E3A">Strength</text>
  <text x="585" y="136" text-anchor="middle" font-size="11" fill="#C0284A" font-weight="500">Established and close to existing capabilities</text>

  <rect x="122" y="249" width="306" height="164" rx="8" fill="#7A8A9A" fill-opacity="0.12"/>
  <text x="275" y="284" text-anchor="middle" font-size="17" font-weight="700" fill="#556672">Weakness</text>
  <text x="275" y="306" text-anchor="middle" font-size="11" fill="#7A8A9A" font-weight="500">Absent and distant from current profile</text>

  <rect x="432" y="249" width="306" height="164" rx="8" fill="#D48A20" fill-opacity="0.14"/>
  <text x="585" y="284" text-anchor="middle" font-size="17" font-weight="700" fill="#A86A12">Threat</text>
  <text x="585" y="306" text-anchor="middle" font-size="11" fill="#D48A20" font-weight="500">Present but isolated from related sectors</text>

  <circle cx="518" cy="155" r="10" fill="#C0284A"/><circle cx="588" cy="125" r="14" fill="#C0284A" opacity="0.9"/><circle cx="632" cy="172" r="8" fill="#C0284A" opacity="0.85"/><circle cx="555" cy="192" r="11" fill="#C0284A" opacity="0.8"/><circle cx="490" cy="208" r="9" fill="#C0284A" opacity="0.7"/><circle cx="662" cy="135" r="6" fill="#C0284A" opacity="0.75"/><circle cx="540" cy="108" r="6" fill="#C0284A" opacity="0.65"/><circle cx="702" cy="188" r="7" fill="#C0284A" opacity="0.6"/><circle cx="470" cy="165" r="5" fill="#C0284A" opacity="0.55"/>

  <circle cx="222" cy="135" r="9" fill="#0D9B8A"/><circle cx="292" cy="168" r="12" fill="#0D9B8A" opacity="0.9"/><circle cx="185" cy="195" r="8" fill="#0D9B8A" opacity="0.8"/><circle cx="350" cy="142" r="7" fill="#0D9B8A" opacity="0.75"/><circle cx="255" cy="108" r="6" fill="#0D9B8A" opacity="0.65"/><circle cx="162" cy="152" r="10" fill="#0D9B8A" opacity="0.7"/><circle cx="320" cy="200" r="5" fill="#0D9B8A" opacity="0.6"/>

  <circle cx="202" cy="322" r="7" fill="#7A8A9A" opacity="0.6"/><circle cx="250" cy="360" r="5" fill="#7A8A9A" opacity="0.5"/><circle cx="298" cy="300" r="8" fill="#7A8A9A" opacity="0.55"/><circle cx="350" cy="380" r="4" fill="#7A8A9A" opacity="0.4"/><circle cx="168" cy="372" r="6" fill="#7A8A9A" opacity="0.4"/><circle cx="322" cy="348" r="5" fill="#7A8A9A" opacity="0.35"/><circle cx="155" cy="308" r="5" fill="#7A8A9A" opacity="0.35"/>

  <circle cx="528" cy="300" r="8" fill="#D48A20" opacity="0.85"/><circle cx="600" cy="345" r="7" fill="#D48A20" opacity="0.75"/><circle cx="562" cy="380" r="10" fill="#D48A20" opacity="0.8"/><circle cx="648" cy="290" r="6" fill="#D48A20" opacity="0.7"/><circle cx="682" cy="362" r="7" fill="#D48A20" opacity="0.65"/><circle cx="495" cy="370" r="5" fill="#D48A20" opacity="0.55"/><circle cx="620" cy="395" r="5" fill="#D48A20" opacity="0.5"/>

  <text x="400" y="488" text-anchor="middle" font-size="11" fill="#7A8A9A">Each dot = an industry or product class. Size ∝ employment share.</text>
  <text x="400" y="506" text-anchor="middle" font-size="11" fill="#7A8A9A">Quadrant placement guides prioritisation: strengths to protect, opportunities to develop.</text>
</svg>
