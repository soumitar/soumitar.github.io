  <text x="160" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#9A1E3A">Machinery &amp;</text>
  <text x="160" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#9A1E3A">mechanical equipment</text>
  <text x="160" y="164" text-anchor="middle" font-size="10" font-weight="500" fill="#C0284A">HS Chapter 84</text>

  <rect x="290" y="72" width="200" height="140" rx="6" fill="#0D9B8A" fill-opacity="0.12" stroke="#0D9B8A" stroke-width="1"/>
  <text x="390" y="126" text-anchor="middle" font-size="14" font-weight="700" fill="#0A7A6C">Electrical</text>
  <text x="390" y="144" text-anchor="middle" font-size="14" font-weight="700" fill="#0A7A6C">equipment</text>
  <text x="390" y="164" text-anchor="middle" font-size="10" font-weight="500" fill="#0D9B8A">HS Chapter 85</text>

  <rect x="500" y="72" width="130" height="66" rx="6" fill="#D48A20" fill-opacity="0.12" stroke="#D48A20" stroke-width="1"/>
  <text x="565" y="102" text-anchor="middle" font-size="12" font-weight="700" fill="#A86A12">Optical &amp; measuring</text>
  <text x="565" y="118" text-anchor="middle" font-size="9.5" font-weight="500" fill="#D48A20">HS 90</text>

  <rect x="640" y="72" width="120" height="66" rx="6" fill="#C0284A" fill-opacity="0.08" stroke="#C0284A" stroke-width="0.8"/>
  <text x="700" y="102" text-anchor="middle" font-size="12" font-weight="700" fill="#9A1E3A">Iron &amp; steel</text>
  <text x="700" y="118" text-anchor="middle" font-size="9.5" font-weight="500" fill="#C0284A">HS 72-73</text>

  <rect x="500" y="146" width="260" height="66" rx="6" fill="#D48A20" fill-opacity="0.08" stroke="#D48A20" stroke-width="0.8"/>
