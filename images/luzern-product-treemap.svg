<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif">
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2A2028">Regional product structure by employment share</text>
  <text x="400" y="48" text-anchor="middle" font-size="11.5" fill="#7A8A9A">AI-extracted from company websites, classified by Harmonised System (HS) chapter, weighted by firm employment</text>

