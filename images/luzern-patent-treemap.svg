<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif">
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2A2028">Patent structure by IPC section</text>
  <text x="400" y="48" text-anchor="middle" font-size="12" fill="#7A8A9A">PATSTAT + Orbis IP, 2010–2022. Classified at 4-digit IPC main class level.</text>

  <rect x="40" y="70" width="270" height="135" rx="6" fill="#C0284A" fill-opacity="0.12" stroke="#C0284A" stroke-width="1"/>
  <text x="175" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#9A1E3A">G — Physics</text>
  <text x="175" y="142" text-anchor="middle" font-size="10" font-weight="500" fill="#C0284A">Signal processing, sensors,</text>
  <text x="175" y="156" text-anchor="middle" font-size="10" font-weight="500" fill="#C0284A">measurement, data processing</text>

  <rect x="320" y="70" width="220" height="135" rx="6" fill="#B04878" fill-opacity="0.12" stroke="#B04878" stroke-width="1"/>
