  <text x="430" y="142" text-anchor="middle" font-size="10" font-weight="500" fill="#B04878">Conductive connections,</text>
  <text x="430" y="156" text-anchor="middle" font-size="10" font-weight="500" fill="#B04878">cables, switches, comms</text>

  <rect x="550" y="70" width="210" height="135" rx="6" fill="#0D9B8A" fill-opacity="0.12" stroke="#0D9B8A" stroke-width="1"/>
  <text x="655" y="114" text-anchor="middle" font-size="15" font-weight="700" fill="#0A7A6C">A — Human</text>
  <text x="655" y="134" text-anchor="middle" font-size="15" font-weight="700" fill="#0A7A6C">necessities</text>
  <text x="655" y="156" text-anchor="middle" font-size="10" font-weight="500" fill="#0D9B8A">Medical, pharmaceutical</text>

  <rect x="40" y="216" width="220" height="108" rx="6" fill="#D48A20" fill-opacity="0.12" stroke="#D48A20" stroke-width="1"/>
  <text x="150" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#A86A12">B — Operations &amp;</text>
  <text x="150" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#A86A12">transport</text>
  <text x="150" y="298" text-anchor="middle" font-size="10" font-weight="500" fill="#D48A20">Wood, pressing, coating</text>

