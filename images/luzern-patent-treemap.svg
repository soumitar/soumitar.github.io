  <text x="360" y="282" text-anchor="middle" font-size="10" font-weight="500" fill="#3A6EA5">Building elements,</text>
  <text x="360" y="296" text-anchor="middle" font-size="10" font-weight="500" fill="#3A6EA5">water supply</text>

  <rect x="460" y="216" width="150" height="108" rx="6" fill="#7A8A9A" fill-opacity="0.1" stroke="#7A8A9A" stroke-width="0.8"/>
  <text x="535" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#556672">F — Mechanical</text>
  <text x="535" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#556672">engineering</text>
  <text x="535" y="298" text-anchor="middle" font-size="10" font-weight="500" fill="#7A8A9A">Heating, lighting</text>

  <rect x="620" y="216" width="140" height="108" rx="6" fill="#D48A20" fill-opacity="0.08" stroke="#D48A20" stroke-width="0.8"/>
