  <rect x="40" y="338" width="720" height="34" rx="6" fill="none" stroke="#7A8A9A" stroke-width="0.8" stroke-dasharray="5 4"/>
  <text x="400" y="360" text-anchor="middle" font-size="11" font-weight="500" fill="#7A8A9A">D — Textiles &amp; paper (smaller share, included in full analysis)</text>

  <text x="400" y="400" text-anchor="middle" font-size="10.5" fill="#7A8A9A">Box size ∝ share of regional patent filings. K5: 5,907 patents / 160 firms. Reference: 743,711 (rest of CH).</text>
