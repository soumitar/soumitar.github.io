  <line x1="310" y1="265" x2="350" y2="295" stroke="#D48A20" stroke-width="0.8" opacity="0.5"/><line x1="350" y1="295" x2="392" y2="270" stroke="#D48A20" stroke-width="0.8" opacity="0.5"/><line x1="310" y1="265" x2="392" y2="270" stroke="#D48A20" stroke-width="0.8" opacity="0.4"/><line x1="275" y1="293" x2="310" y2="265" stroke="#D48A20" stroke-width="0.8" opacity="0.45"/><line x1="275" y1="293" x2="350" y2="295" stroke="#D48A20" stroke-width="0.6" opacity="0.3"/><line x1="392" y1="270" x2="422" y2="296" stroke="#D48A20" stroke-width="0.6" opacity="0.3"/>
  <circle cx="310" cy="265" r="9" fill="#D48A20" opacity="0.85"/><circle cx="350" cy="295" r="12" fill="#D48A20" opacity="0.9"/><circle cx="392" cy="270" r="8" fill="#D48A20" opacity="0.85"/><circle cx="275" cy="293" r="6" fill="#D48A20" opacity="0.4"/><circle cx="422" cy="296" r="5" fill="#D48A20" opacity="0.35"/>

