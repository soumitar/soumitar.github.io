  <line x1="120" y1="348" x2="155" y2="378" stroke="#3A6EA5" stroke-width="0.8" opacity="0.5"/><line x1="155" y1="378" x2="192" y2="352" stroke="#3A6EA5" stroke-width="0.8" opacity="0.5"/><line x1="120" y1="348" x2="192" y2="352" stroke="#3A6EA5" stroke-width="0.8" opacity="0.4"/><line x1="155" y1="378" x2="185" y2="402" stroke="#3A6EA5" stroke-width="0.6" opacity="0.3"/><line x1="90" y1="375" x2="120" y2="348" stroke="#3A6EA5" stroke-width="0.8" opacity="0.45"/>
  <circle cx="120" cy="348" r="8" fill="#3A6EA5" opacity="0.85"/><circle cx="155" cy="378" r="9" fill="#3A6EA5" opacity="0.9"/><circle cx="192" cy="352" r="7" fill="#3A6EA5" opacity="0.8"/><circle cx="185" cy="402" r="5" fill="#3A6EA5" opacity="0.4"/><circle cx="90" cy="375" r="6" fill="#3A6EA5" opacity="0.8"/>

