<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 510" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif">
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2A2028">Product space: relatedness across HS categories</text>
  <text x="400" y="48" text-anchor="middle" font-size="11.5" fill="#7A8A9A">Products co-occurring across regions are positioned closer (Hidalgo et al., 2007). Bright dots = RCA &gt; 1.</text>

  <!-- Cluster 1: Construction - teal -->
  <line x1="150" y1="120" x2="185" y2="148" stroke="#0D9B8A" stroke-width="0.8" opacity="0.5"/><line x1="185" y1="148" x2="222" y2="122" stroke="#0D9B8A" stroke-width="0.8" opacity="0.5"/><line x1="150" y1="120" x2="222" y2="122" stroke="#0D9B8A" stroke-width="0.8" opacity="0.4"/><line x1="185" y1="148" x2="218" y2="172" stroke="#0D9B8A" stroke-width="0.6" opacity="0.3"/><line x1="222" y1="122" x2="255" y2="140" stroke="#0D9B8A" stroke-width="0.6" opacity="0.3"/><line x1="115" y1="148" x2="150" y2="120" stroke="#0D9B8A" stroke-width="0.8" opacity="0.45"/><line x1="115" y1="148" x2="185" y2="148" stroke="#0D9B8A" stroke-width="0.6" opacity="0.3"/>
  <circle cx="150" cy="120" r="10" fill="#0D9B8A" opacity="0.9"/><circle cx="185" cy="148" r="8" fill="#0D9B8A" opacity="0.85"/><circle cx="222" cy="122" r="9" fill="#0D9B8A" opacity="0.9"/><circle cx="218" cy="172" r="5" fill="#0D9B8A" opacity="0.4"/><circle cx="255" cy="140" r="4" fill="#0D9B8A" opacity="0.35"/><circle cx="115" cy="148" r="7" fill="#0D9B8A" opacity="0.8"/>

  <!-- Cluster 2: Electronics - crimson -->
  <line x1="480" y1="108" x2="518" y2="138" stroke="#C0284A" stroke-width="0.8" opacity="0.5"/><line x1="518" y1="138" x2="558" y2="112" stroke="#C0284A" stroke-width="0.8" opacity="0.5"/><line x1="480" y1="108" x2="558" y2="112" stroke="#C0284A" stroke-width="0.8" opacity="0.4"/><line x1="518" y1="138" x2="548" y2="160" stroke="#C0284A" stroke-width="0.6" opacity="0.3"/><line x1="558" y1="112" x2="592" y2="130" stroke="#C0284A" stroke-width="0.6" opacity="0.3"/><line x1="592" y1="130" x2="618" y2="108" stroke="#C0284A" stroke-width="0.6" opacity="0.3"/><line x1="558" y1="112" x2="618" y2="108" stroke="#C0284A" stroke-width="0.8" opacity="0.4"/>
  <circle cx="480" cy="108" r="8" fill="#C0284A" opacity="0.85"/><circle cx="518" cy="138" r="10" fill="#C0284A" opacity="0.9"/><circle cx="558" cy="112" r="9" fill="#C0284A" opacity="0.9"/><circle cx="548" cy="160" r="5" fill="#C0284A" opacity="0.4"/><circle cx="592" cy="130" r="6" fill="#C0284A" opacity="0.45"/><circle cx="618" cy="108" r="6" fill="#C0284A" opacity="0.8"/>

