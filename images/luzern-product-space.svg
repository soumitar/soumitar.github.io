  <line x1="218" y1="172" x2="275" y2="293" stroke="#7A8A9A" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.3"/><line x1="548" y1="160" x2="530" y2="330" stroke="#7A8A9A" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.3"/><line x1="255" y1="140" x2="480" y2="108" stroke="#7A8A9A" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.25"/><line x1="192" y1="352" x2="275" y2="293" stroke="#7A8A9A" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.3"/><line x1="422" y1="296" x2="530" y2="330" stroke="#7A8A9A" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.25"/>

  <circle cx="370" cy="195" r="3" fill="#7A8A9A" opacity="0.3"/><circle cx="420" cy="215" r="3" fill="#7A8A9A" opacity="0.3"/><circle cx="300" cy="175" r="3" fill="#7A8A9A" opacity="0.3"/><circle cx="460" cy="245" r="3" fill="#7A8A9A" opacity="0.3"/><circle cx="380" cy="370" r="3" fill="#7A8A9A" opacity="0.3"/>

  <!-- Legend -->
  <circle cx="80" cy="442" r="5" fill="#0D9B8A" opacity="0.9"/><text x="92" y="446" font-size="10" fill="#2A2028">Construction &amp; building</text>
  <circle cx="250" cy="442" r="5" fill="#C0284A" opacity="0.9"/><text x="262" y="446" font-size="10" fill="#2A2028">Electronics &amp; instruments</text>
  <circle cx="440" cy="442" r="5" fill="#D48A20" opacity="0.9"/><text x="452" y="446" font-size="10" fill="#2A2028">Metals &amp; machinery</text>
  <circle cx="80" cy="462" r="5" fill="#3A6EA5" opacity="0.9"/><text x="92" y="466" font-size="10" fill="#2A2028">Chemicals &amp; environment</text>
  <circle cx="280" cy="462" r="5" fill="#B04878" opacity="0.9"/><text x="292" y="466" font-size="10" fill="#2A2028">Textiles &amp; apparel</text>
  <circle cx="450" cy="462" r="5" fill="#7A8A9A" opacity="0.3"/><text x="462" y="466" font-size="10" fill="#7A8A9A">Unassigned / weak presence</text>

  <text x="400" y="496" text-anchor="middle" font-size="10.5" fill="#7A8A9A">Node size proportional to employment share. Bright nodes = RCA &gt; 1 (above-average regional specialisation).</text>
</svg>
