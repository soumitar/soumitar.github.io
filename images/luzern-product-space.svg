  <line x1="530" y1="330" x2="568" y2="360" stroke="#B04878" stroke-width="0.8" opacity="0.5"/><line x1="568" y1="360" x2="605" y2="335" stroke="#B04878" stroke-width="0.8" opacity="0.5"/><line x1="530" y1="330" x2="605" y2="335" stroke="#B04878" stroke-width="0.8" opacity="0.4"/><line x1="568" y1="360" x2="595" y2="385" stroke="#B04878" stroke-width="0.6" opacity="0.3"/>
