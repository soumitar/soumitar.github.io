<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 510" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif">
  <text x="400" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2A2028">Industry space: sectors grouped by skill proximity</text>
